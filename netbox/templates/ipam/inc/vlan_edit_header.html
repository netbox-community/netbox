{% load helpers %}
{% load i18n %}

<ul class="nav nav-tabs">
  <li class="nav-item">
    <a href="{% if object.pk %}{% url 'ipam:vlan_edit' pk=object.pk %}{% else %}{% url 'ipam:vlan_add' %}{% querystring %}{% endif %}"
       class="nav-link{% if active_tab == 'add' %} active{% endif %}">
      {% if object.pk %}
        {% trans "VLAN" %}
      {% else %}
        {% trans "Create" %}
      {% endif %}
    </a>
  </li>
  {% if not object.pk %}
    <li class="nav-item">
      <a href="{% url 'ipam:vlan_bulk_add' %}{% querystring %}"
         class="nav-link{% if active_tab == 'bulk_add' %} active{% endif %}">
        {% trans "Bulk Create" %}
      </a>
    </li>
  {% endif %}
</ul>
